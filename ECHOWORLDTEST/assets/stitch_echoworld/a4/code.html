<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e5e9e6",
              "on-error-container": "#752121",
              "tertiary": "#665b6e",
              "surface-container": "#ecefec",
              "surface-tint": "#5f5e5e",
              "on-tertiary": "#fff6ff",
              "tertiary-container": "#f2e3fa",
              "on-background": "#2d3432",
              "background": "#f9f9f7",
              "primary-fixed-dim": "#d6d4d3",
              "surface": "#f9f9f7",
              "secondary-fixed": "#d4e5f4",
              "on-secondary-fixed": "#32414d",
              "on-primary-fixed-variant": "#5c5b5b",
              "secondary": "#51616e",
              "on-primary-container": "#525151",
              "surface-container-highest": "#dee4e0",
              "error-dim": "#4e0309",
              "primary-fixed": "#e4e2e1",
              "tertiary-fixed-dim": "#e3d5eb",
              "on-error": "#fff7f6",
              "outline-variant": "#adb3b0",
              "on-surface": "#2d3432",
              "error": "#9f403d",
              "tertiary-fixed": "#f2e3fa",
              "surface-container-low": "#f2f4f2",
              "on-tertiary-fixed-variant": "#665b6e",
              "outline": "#767c79",
              "tertiary-dim": "#594f61",
              "primary-container": "#e4e2e1",
              "on-primary-fixed": "#3f3f3f",
              "secondary-container": "#d4e5f4",
              "surface-variant": "#dee4e0",
              "on-secondary-fixed-variant": "#4e5d6a",
              "primary": "#5f5e5e",
              "on-secondary": "#f5f9ff",
              "surface-dim": "#d4dcd8",
              "inverse-on-surface": "#9c9d9b",
              "on-primary": "#faf7f6",
              "surface-bright": "#f9f9f7",
              "primary-dim": "#535252",
              "on-tertiary-fixed": "#493f51",
              "on-secondary-container": "#445460",
              "secondary-fixed-dim": "#c6d6e6",
              "on-surface-variant": "#5a605e",
              "inverse-surface": "#0c0f0e",
              "secondary-dim": "#455562",
              "on-tertiary-container": "#5b5163",
              "surface-container-lowest": "#ffffff",
              "error-container": "#fe8983",
              "inverse-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .ethereal-gradient {
            background: linear-gradient(135deg, #f9f9f7 0%, #f2f4f2 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body antialiased min-h-screen flex items-center justify-center p-6">
<div class="max-w-md w-full">
<!-- Brand Header Section -->
<header class="mb-16 text-center">
<div class="inline-block mb-8">
<div class="w-12 h-12 rounded-xl bg-surface-container-highest flex items-center justify-center mb-4 mx-auto">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="shield_lock">shield_lock</span>
</div>
</div>
<h1 class="font-headline text-3xl md:text-4xl text-on-surface tracking-tight mb-3">保护你的数字记忆</h1>
<p class="text-on-surface-variant font-body text-sm tracking-wide opacity-80 uppercase">ECHOWORLD SECURITY ARCHIVE</p>
</header>
<!-- Form Container -->
<div class="space-y-12">
<!-- Password Inputs -->
<div class="space-y-8">
<div class="group relative">
<label class="block text-xs font-label uppercase tracking-widest text-outline mb-2 ml-1">输入新密码</label>
<div class="relative flex items-center bg-surface-container-low rounded-xl px-4 py-4 transition-all focus-within:bg-surface-container">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline-variant font-body tracking-widest" placeholder="••••••••" type="password"/>
<button class="text-outline-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="group relative">
<label class="block text-xs font-label uppercase tracking-widest text-outline mb-2 ml-1">确认密码</label>
<div class="relative flex items-center bg-surface-container-low rounded-xl px-4 py-4 transition-all focus-within:bg-surface-container">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline-variant font-body tracking-widest" placeholder="••••••••" type="password"/>
<button class="text-outline-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Security Checklist -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_10px_40px_rgba(45,52,50,0.03)] border-b-2 border-surface-container-high">
<h3 class="font-label text-xs uppercase tracking-[0.2em] text-secondary mb-6">安全建议</h3>
<ul class="space-y-5">
<li class="flex items-center gap-4 text-sm text-on-surface-variant">
<div class="w-5 h-5 rounded-full bg-vitality-mint/20 flex items-center justify-center text-[#A8C3B8]">
<span class="material-symbols-outlined text-sm" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="tracking-tight">至少包含 8 个字符</span>
</li>
<li class="flex items-center gap-4 text-sm text-on-surface-variant">
<div class="w-5 h-5 rounded-full bg-surface-container flex items-center justify-center text-outline-variant">
<span class="material-symbols-outlined text-sm" data-icon="circle">circle</span>
</div>
<span class="tracking-tight">包含大写字母或数字</span>
</li>
<li class="flex items-center gap-4 text-sm text-on-surface-variant opacity-60">
<div class="w-5 h-5 rounded-full bg-surface-container flex items-center justify-center text-outline-variant">
<span class="material-symbols-outlined text-sm" data-icon="circle">circle</span>
</div>
<span class="tracking-tight">避免使用常用词汇</span>
</li>
</ul>
</div>
<!-- Action Section -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary py-5 rounded-xl font-label text-sm tracking-[0.15em] uppercase shadow-lg shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>完成创建</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center mt-8 text-xs text-outline font-label tracking-wide">
                    继续操作即表示您同意我们的 <a class="underline underline-offset-4 hover:text-primary transition-colors" href="#">隐私协议</a>
</p>
</div>
</div>
<!-- Abstract Decorative Element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-surface-container-highest to-transparent opacity-50"></div>
</div>
<!-- Background Ambience -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-surface-container-high rounded-full blur-[120px] opacity-30"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-tertiary-container rounded-full blur-[120px] opacity-20"></div>
</div>
</body></html>
