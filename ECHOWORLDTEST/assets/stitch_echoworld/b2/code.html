<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e5e9e6",
              "on-error-container": "#752121",
              "tertiary": "#665b6e",
              "surface-container": "#ecefec",
              "surface-tint": "#5f5e5e",
              "on-tertiary": "#fff6ff",
              "tertiary-container": "#f2e3fa",
              "on-background": "#2d3432",
              "background": "#f9f9f7",
              "primary-fixed-dim": "#d6d4d3",
              "surface": "#f9f9f7",
              "secondary-fixed": "#d4e5f4",
              "on-secondary-fixed": "#32414d",
              "on-primary-fixed-variant": "#5c5b5b",
              "secondary": "#51616e",
              "on-primary-container": "#525151",
              "surface-container-highest": "#dee4e0",
              "error-dim": "#4e0309",
              "primary-fixed": "#e4e2e1",
              "tertiary-fixed-dim": "#e3d5eb",
              "on-error": "#fff7f6",
              "outline-variant": "#adb3b0",
              "on-surface": "#2d3432",
              "error": "#9f403d",
              "tertiary-fixed": "#f2e3fa",
              "surface-container-low": "#f2f4f2",
              "on-tertiary-fixed-variant": "#665b6e",
              "outline": "#767c79",
              "tertiary-dim": "#594f61",
              "primary-container": "#e4e2e1",
              "on-primary-fixed": "#3f3f3f",
              "secondary-container": "#d4e5f4",
              "surface-variant": "#dee4e0",
              "on-secondary-fixed-variant": "#4e5d6a",
              "primary": "#5f5e5e",
              "on-secondary": "#f5f9ff",
              "surface-dim": "#d4dcd8",
              "inverse-on-surface": "#9c9d9b",
              "on-primary": "#faf7f6",
              "surface-bright": "#f9f9f7",
              "primary-dim": "#535252",
              "on-tertiary-fixed": "#493f51",
              "on-secondary-container": "#445460",
              "secondary-fixed-dim": "#c6d6e6",
              "on-surface-variant": "#5a605e",
              "inverse-surface": "#0c0f0e",
              "secondary-dim": "#455562",
              "on-tertiary-container": "#5b5163",
              "surface-container-lowest": "#ffffff",
              "error-container": "#fe8983",
              "inverse-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .viewfinder-mask {
            background: radial-gradient(circle, transparent 60%, rgba(45, 52, 50, 0.4) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background antialiased overflow-hidden h-screen flex flex-col">
<!-- Top AppBar (Internal Camera View - Minimalist) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-transparent">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface/20 backdrop-blur-md active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<div class="px-4 py-1.5 rounded-full bg-surface-container-low/40 backdrop-blur-xl border border-white/10">
<p class="text-[10px] tracking-[0.2em] uppercase font-medium text-on-surface/80">Pro Mode</p>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface/20 backdrop-blur-md active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface">settings</span>
</button>
</header>
<!-- Main Viewfinder Section -->
<main class="relative flex-grow flex flex-col items-center justify-center">
<!-- Camera Stream Placeholder -->
<div class="absolute inset-0 z-0">
<img alt="A vintage camera object on a clean minimal surface" class="w-full h-full object-cover" data-alt="A vintage camera object on a clean minimal surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3mgMlPVaF5OmXib751QZW5rf5MwLmBnFY9A4pmcJm_JjgfoAHLsetNelFpdmGknDBN90d8T_1E0QA0VmrvMdGyVmgrrwkiHAQJ_u82LmMmZP9qgW5-UWQp_xGx0GbSeWK8EaN8j6nipECWcDyGpecE_gD-FD7j_-MnvyYqUFXtYYOdp5lDJjxcfMEqOouqFNn5Uy_lGo4ODwCV7nk6S1VzKE3VCyavC08shZ3JDEZ500jG11wWEcKvd5ZAhrWa-uBZTndlLzT9_g"/>
<!-- Ethereal Overlay -->
<div class="absolute inset-0 viewfinder-mask"></div>
</div>
<!-- Instructional Overlay -->
<div class="relative z-10 text-center px-12 mt-[-10vh]">
<h2 class="font-headline text-on-primary text-xl md:text-2xl mb-4 tracking-tight drop-shadow-sm">
                寻找一个实物作为居民的原型。
            </h2>
<p class="font-label text-on-primary/70 text-sm tracking-widest uppercase">
                (请勿包含人物)
            </p>
</div>
<!-- Focus Frame (Digital Curator Aesthetic) -->
<div class="relative z-10 w-72 h-72 md:w-96 md:h-96 border-[0.5px] border-on-primary/20 rounded-xl pointer-events-none">
<!-- Corners -->
<div class="absolute top-0 left-0 w-8 h-8 border-t border-l border-on-primary/60 rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t border-r border-on-primary/60 rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b border-l border-on-primary/60 rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b border-r border-on-primary/60 rounded-br-xl"></div>
<!-- Scanning Line (Decorative) -->
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-on-primary/10"></div>
<div class="absolute left-1/2 top-0 h-full w-[1px] bg-on-primary/10"></div>
</div>
</main>
<!-- Camera Controls (Floating Container) -->
<section class="fixed bottom-0 w-full pb-12 pt-8 px-8 z-50 flex flex-col items-center gap-10">
<!-- Zoom / Filter Controls (Tonal Shift) -->
<div class="flex items-center gap-8 bg-surface-container-low/20 backdrop-blur-2xl px-6 py-2.5 rounded-full border border-white/5">
<button class="text-[11px] font-bold tracking-widest text-on-surface/40 hover:text-on-surface">0.5x</button>
<button class="text-[11px] font-bold tracking-widest text-on-surface bg-on-surface/5 px-3 py-1 rounded-full">1x</button>
<button class="text-[11px] font-bold tracking-widest text-on-surface/40 hover:text-on-surface">2x</button>
</div>
<!-- Main Capture Row -->
<div class="w-full max-w-md flex items-center justify-between">
<!-- Gallery Thumb -->
<button class="w-12 h-12 rounded-lg overflow-hidden border-2 border-white/20 active:scale-90 transition-transform shadow-lg">
<img alt="Recent photo thumbnail" class="w-full h-full object-cover" data-alt="Recent photo gallery thumbnail" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbOSZQGsITjNO3XakuH7MmEXmGq36JzwlOvLObjRW3zNoIMW5mYkSNgmYPajOcjeyHvly0I2LR0_jsdML4GXMCSIU-pbT3plJqNvCyVaVg3mfaFh8qRFk5sS5h6DwA293sW8dTzZR5zmhLmCQyzRzcyuOKfa88wCeV0RnVnu7H-QyoaJzU_WS1P4fU7FIt4nRo8p6f4skT0y_8jNEOjL2B4eBtsN_dWgq-2Om-7s4VSL-uEdyd_xqwZobZTfqsO1_JVPqhubBu7RE"/>
</button>
<!-- Shutter Button (The Echo Feedback design) -->
<button class="group relative flex items-center justify-center active:scale-90 transition-all duration-300">
<div class="absolute inset-0 bg-white/10 rounded-full scale-150 blur-xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
<!-- Outer Ring -->
<div class="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center">
<!-- Inner Shutter -->
<div class="w-16 h-16 rounded-full bg-white shadow-inner"></div>
</div>
</button>
<!-- Switch Camera -->
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-md active:scale-90 transition-transform">
<span class="material-symbols-outlined text-white text-2xl">flip_camera_ios</span>
</button>
</div>
<!-- Status Indicator -->
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="text-[10px] tracking-[0.3em] uppercase text-on-surface/60 font-medium">Ready to Archive</span>
</div>
</section>
<!-- Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay z-[60]">
<svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<filter id="noiseFilter">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
</svg>
</div>
</body></html>
