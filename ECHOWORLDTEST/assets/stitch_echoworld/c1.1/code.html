<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f7]/80 dark:bg-[#2d3432]/80 backdrop-blur-xl shadow-[0_10px_40px_rgba(45,52,50,0.04)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#5f5e5e] dark:text-[#e4e2e1] active:scale-95 transition-transform cursor-pointer">menu</span>
</div>
<h1 class="font-headline text-xl tracking-[0.2em] text-[#2d3432] dark:text-[#faf7f6] uppercase">ECHOWORLD</h1>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#5f5e5e] dark:text-[#e4e2e1] active:scale-95 transition-transform cursor-pointer">notifications</span>
</div>
</div>
<div class="bg-[#f2f4f2] dark:bg-[#3d4442] h-[1px] w-full opacity-30"></div>
</header>
<!-- Main Canvas: Map Background with Overlay -->
<main class="relative min-h-screen w-full flex items-center justify-center pt-16 pb-24 overflow-hidden map-bg" data-location="Daikanyama, Tokyo">
<!-- Scrim to soften the map -->
<div class="absolute inset-0 bg-background/40 backdrop-blur-[2px]"></div>
<!-- Resident Card Overlay (The Digital Curator Aesthetic) -->
<div class="relative z-10 w-full max-w-lg mx-4">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_20px_60px_rgba(45,52,50,0.1)] overflow-hidden transition-all duration-500 hover:shadow-[0_30px_80px_rgba(45,52,50,0.15)]">
<!-- Close Button -->
<button class="absolute top-4 right-4 z-20 w-8 h-8 flex items-center justify-center rounded-full bg-surface/50 backdrop-blur hover:bg-surface transition-colors">
<span class="material-symbols-outlined text-sm">close</span>
</button>
<!-- High-Res Portrait Section -->
<div class="relative aspect-[4/5] overflow-hidden">
<img alt="Evelyn Vance Portrait" class="w-full h-full object-cover transition-transform duration-700 hover:scale-105" data-alt="Close up editorial portrait of an elegant woman in a library setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqz0j4stgyGRJoWnfp3JBJPOV2gb1DGhB3ly5Opdj0b4cy89Ql7zi1U54Tu3LNd3Qh6iFSDG2bwSXbdIRtbto6xpDXMahIfblCW_q-OIdsixz7WJsJ3JRnGtDEuZ7IHOk33dhT-Cf1AK1L3Y044oN2zSfW56OUaD4Yw3HsBieqO_0HJ5rnS0z7JclRbETrFLMHZ3uWDlY4cQxi8pplweKBM9o6gx028yiVw4l0KpXvIwh_I85GdrqGaEm4tpCbv-RIH50hrJXyO0Q"/>
<!-- Atmospheric Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest via-transparent to-transparent opacity-60"></div>
<!-- Time Badge (Ethereal Style) -->
<div class="absolute bottom-6 right-6 flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/20 glass-effect border border-white/10 text-on-surface">
<span class="material-symbols-outlined text-xs">schedule</span>
<span class="text-xs font-medium tracking-widest">16:42</span>
</div>
</div>
<!-- Identity & Status Content -->
<div class="px-8 pt-6 pb-10 space-y-6">
<div class="space-y-1">
<p class="text-[10px] uppercase tracking-[0.2em] text-outline font-medium">Resident ID: #EV-0912</p>
<h2 class="font-headline text-3xl text-on-surface tracking-tight">艾芙琳 · 凡斯</h2>
</div>
<div class="grid grid-cols-1 gap-6">
<!-- Location & Status as Tonal Cards -->
<div class="space-y-4">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-secondary mt-1">location_on</span>
<div>
<p class="text-[10px] uppercase tracking-wider text-outline mb-0.5">Current Location</p>
<p class="text-sm font-medium text-on-surface-variant">代官山 T-SITE · 2F</p>
</div>
</div>
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-secondary mt-1">auto_stories</span>
<div>
<p class="text-[10px] uppercase tracking-wider text-outline mb-0.5">Current Activity</p>
<p class="text-sm italic font-headline text-on-surface-variant">正在阅读《时间简史》</p>
</div>
</div>
</div>
<!-- Emotional Nuance Tag -->
<div class="flex flex-wrap gap-2">
<span class="bg-tertiary-container text-on-tertiary-container px-3 py-1 rounded-full text-[10px] uppercase tracking-wider font-semibold">沈思中 (Contemplative)</span>
<span class="bg-surface-container-high text-on-surface-variant px-3 py-1 rounded-full text-[10px] uppercase tracking-wider font-semibold">Verified Resident</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-3 pt-4">
<button class="flex-1 bg-primary text-on-primary py-3 rounded-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-sm" data-weight="fill">chat_bubble</span>
<span class="text-xs uppercase tracking-[0.15em] font-semibold">对话</span>
</button>
<button class="flex-1 border border-outline-variant/30 text-on-surface py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container-low active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-sm">menu_book</span>
<span class="text-xs uppercase tracking-[0.15em] font-semibold">查看日志</span>
</button>
</div>
</div>
</div>

<a class="flex flex-col items-center justify-center text-[#5f5e5e] dark:text-[#faf7f6] relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-[#5f5e5e] after:rounded-full transition-all duration-500 active:scale-90" href="#">
<span class="material-symbols-outlined" data-weight="fill">map</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase mt-1">Map</span>
</a>
<!-- Archive Tab -->
<a class="flex flex-col items-center justify-center text-[#adb3b0] dark:text-[#51616e] opacity-60 hover:text-[#5f5e5e] dark:hover:text-[#faf7f6] transition-all duration-500 active:scale-90" href="#">
<span class="material-symbols-outlined">shelves</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase mt-1">Archive</span>
</a>
<!-- Echoes Tab -->
<a class="flex flex-col items-center justify-center text-[#adb3b0] dark:text-[#51616e] opacity-60 hover:text-[#5f5e5e] dark:hover:text-[#faf7f6] transition-all duration-500 active:scale-90" href="#">
<span class="material-symbols-outlined">waves</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase mt-1">Echoes</span>
</a>
<!-- Profile Tab -->
<a class="flex flex-col items-center justify-center text-[#adb3b0] dark:text-[#51616e] opacity-60 hover:text-[#5f5e5e] dark:hover:text-[#faf7f6] transition-all duration-500 active:scale-90" href="#">
<span class="material-symbols-outlined">person_pin</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase mt-1">Profile</span>
