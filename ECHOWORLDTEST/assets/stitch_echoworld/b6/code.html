<body class="bg-background text-on-surface font-body selection:bg-tertiary-container selection:text-on-tertiary-container">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-[#f9f9f7]/80 backdrop-blur-xl shadow-[0_10px_40px_rgba(45,52,50,0.04)]">
<div class="flex items-center justify-between px-6 h-16 w-full">

</div>
<h1 class="font-noto-serif text-xl tracking-[0.2em] text-[#2d3432] uppercase">ECHOWORLD</h1>
<div class="active:scale-95 transition-transform hover:opacity-70 transition-opacity duration-300 cursor-pointer">

</div>
</div>
<div class="bg-[#f2f4f2] h-[1px] w-full opacity-30"></div>

<div class="relative w-full max-w-2xl mx-auto flex flex-col items-center">

<div class="relative w-full aspect-[4/5] md:aspect-square mb-12 flex justify-center items-center">
<div class="absolute inset-0 bg-surface-container-low rounded-full scale-95 blur-3xl opacity-50"></div>
<div class="relative z-10 w-full h-full portrait-mask flex items-center justify-center overflow-hidden">
<img alt="Elegant resident portrait" class="w-full h-full object-cover rounded-full grayscale-[0.2] contrast-[1.1]" data-alt="Close up artistic portrait of a serene character" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBa4gmu3-iEuioXFH-_UWzgQRio26MxheC6zqCr6h5i6R44ms4jqxrZu8Z0-H64x12t-gy217K7vHGyCKTDtQaIZpC4QqxrBA0xySZBPICiftoYNCVKu0wAp_O4n0YPIP5VdbXMIxM8xqIGDtYVWQWNxoYIBfMoitkQPfgLdkoSJlCC3XsndP0h0zZRK_gw5-4Fy0Qy0oF4gP2kSBrMHPKZhQZ5NsPVbu-9ij8hRikB_3fGvjvtiBFKYA4VMX0uNC7W5ceKY7lRtX4"/>
</div>

<div class="absolute bottom-10 -left-8 w-32 h-32 bg-secondary-container/20 rounded-full blur-3xl"></div>
</div>
<!-- Arrival Narrative -->
<div class="w-full text-center space-y-8 z-20">
<div class="inline-block px-4 py-1.5 bg-surface-container-lowest border border-outline-variant/15 rounded-full shadow-sm">
<span class="text-[10px] font-label tracking-[0.2em] uppercase text-secondary">New Arrival • 00:00</span>
</div>
<div class="max-w-lg mx-auto bg-surface-container-lowest/60 backdrop-blur-md p-8 rounded-xl shadow-[0_10px_40px_rgba(45,52,50,0.03)] border border-white/50">
<p class="font-headline italic text-lg md:text-xl leading-relaxed text-on-surface opacity-90">
                        “我终于穿过那些回声，来到了这里。在这个寂静的角落，你是否也在等待一份共鸣？”
                    </p>
</div>
<div class="pt-4 flex flex-col items-center gap-6">
<button class="px-10 py-4 bg-primary text-on-primary rounded-xl font-label tracking-widest text-sm uppercase hover:opacity-90 active:scale-95 transition-all duration-300 shadow-xl shadow-primary/10">
                        开启对话
                    </button>
<div class="flex items-center gap-2 text-outline text-xs tracking-tighter font-label">
<span class="w-8 h-[1px] bg-outline-variant/30"></span>
<span>RESIDENT ID: ECHO_B6</span>
<span class="w-8 h-[1px] bg-outline-variant/30"></span>
</div>
</div>
</div>
</div>

</a>

<span class="font-sans text-[10px] tracking-[0.1em] uppercase mt-1">Archive</span>
</a>

<span class="font-sans text-[10px] tracking-[0.1em] uppercase mt-1">Profile</span>
</a>
