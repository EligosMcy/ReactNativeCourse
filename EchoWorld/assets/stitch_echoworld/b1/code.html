    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar Section -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f7]/80 backdrop-blur-xl shadow-[0_10px_40px_rgba(45,52,50,0.04)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-[#5f5e5e] active:scale-95 transition-transform hover:opacity-70">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
<h1 class="font-noto-serif text-xl tracking-[0.2em] text-[#2d3432] uppercase">ECHOWORLD</h1>
<div class="flex items-center gap-4">
<button class="text-[#5f5e5e] active:scale-95 transition-transform hover:opacity-70">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</div>
<div class="bg-[#f2f4f2] h-[1px] w-full opacity-30"></div>
</header>
<!-- Main Canvas: Empty Map State -->
<main class="flex-grow relative flex items-center justify-center pt-16 pb-24">
<!-- Blurred Map Background Layer -->
<div class="absolute inset-0 z-0 bg-map-blur opacity-40 blur-sm overflow-hidden" data-alt="A blurred grayscale city map background" data-location="Shanghai" style=""></div>
<!-- Center Content -->
<div class="relative z-10 max-w-lg px-8 text-center flex flex-col items-center">
<!-- Decorative Icon / Glyph -->
<div class="mb-12 w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center opacity-80">
<span class="material-symbols-outlined text-outline text-4xl" data-icon="public_off">public_off</span>
</div>
<h2 class="font-headline text-4xl md:text-5xl text-on-surface mb-6 tracking-tight">
                这个世界是空的。
            </h2>
<p class="text-on-surface-variant font-light text-lg mb-12 tracking-wide max-w-sm leading-relaxed">
                创建您的第一个居民以开始叙述。
            </p>
<!-- Primary Action -->
<button class="group flex items-center gap-3 bg-primary text-on-primary px-8 py-4 rounded-xl shadow-[0_20px_40px_rgba(95,94,94,0.15)] hover:bg-primary-dim active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="add">add</span>
<span class="font-medium tracking-wider uppercase text-sm">+ 创建居民</span>
</button>
<!-- Secondary Hint -->
<div class="mt-20 flex flex-col items-center gap-4 opacity-40">
<div class="w-px h-12 bg-outline-variant"></div>
<span class="text-[10px] tracking-[0.4em] uppercase font-medium">Archive Empty</span>
</div>
</div>
</main>
<!-- BottomNavBar Section -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pt-3 pb-8 px-4 bg-[#f9f9f7]/90 backdrop-blur-lg z-50 shadow-[0_-5px_30px_rgba(45,52,50,0.03)] rounded-t-3xl">
<!-- Map (Active) -->
<a class="flex flex-col items-center justify-center text-[#5f5e5e] relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-[#5f5e5e] after:rounded-full transition-all duration-500 active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase">Map</span>
</a>
<!-- Archive -->
<a class="flex flex-col items-center justify-center text-[#adb3b0] opacity-60 hover:text-[#5f5e5e] transition-all duration-300 active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="shelves">shelves</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase">Archive</span>
</a>
<!-- Echoes -->
<a class="flex flex-col items-center justify-center text-[#adb3b0] opacity-60 hover:text-[#5f5e5e] transition-all duration-300 active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="waves">waves</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase">Echoes</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-[#adb3b0] opacity-60 hover:text-[#5f5e5e] transition-all duration-300 active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person_pin">person_pin</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase">Profile</span>
</a>
</nav>
</body></html>
