<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e5e9e6",
              "on-error-container": "#752121",
              "tertiary": "#665b6e",
              "surface-container": "#ecefec",
              "surface-tint": "#5f5e5e",
              "on-tertiary": "#fff6ff",
              "tertiary-container": "#f2e3fa",
              "on-background": "#2d3432",
              "background": "#f9f9f7",
              "primary-fixed-dim": "#d6d4d3",
              "surface": "#f9f9f7",
              "secondary-fixed": "#d4e5f4",
              "on-secondary-fixed": "#32414d",
              "on-primary-fixed-variant": "#5c5b5b",

              "surface-container-low": "#f2f4f2",
              "on-tertiary-fixed-variant": "#665b6e",
              "outline": "#767c79",
              "tertiary-dim": "#594f61",
              "primary-container": "#e4e2e1",
              "on-primary-fixed": "#3f3f3f",
              "secondary-container": "#d4e5f4",
              "surface-variant": "#dee4e0",
              "on-secondary-fixed-variant": "#4e5d6a",
              "primary": "#5f5e5e",
              "on-secondary": "#f5f9ff",
              "surface-dim": "#d4dcd8",
              "inverse-on-surface": "#9c9d9b",
              "on-primary": "#faf7f6",
              "surface-bright": "#f9f9f7",
              "primary-dim": "#535252",
              "on-tertiary-fixed": "#493f51",
              "on-secondary-container": "#445460",
              "secondary-fixed-dim": "#c6d6e6",
              "on-surface-variant": "#5a605e",
              "inverse-surface": "#0c0f0e",
              "secondary-dim": "#455562",
              "on-tertiary-container": "#5b5163",
              "surface-container-lowest": "#ffffff",
              "error-container": "#fe8983",
              "inverse-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f7;
        }
        .noto-serif {
            font-family: 'Noto Serif', serif;
        }
        .map-mask {
            mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 w-full bg-[#f9f9f7]/80 backdrop-blur-xl shadow-[0_10px_40px_rgba(45,52,50,0.04)]">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform hover:opacity-70 transition-opacity duration-300 text-[#5f5e5e]">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
<div class="font-noto-serif text-xl tracking-[0.2em] text-[#2d3432] uppercase font-noto-serif tracking-tight">ECHOWORLD</div>
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform hover:opacity-70 transition-opacity duration-300 text-[#5f5e5e]">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
<div class="absolute bottom-0 left-0 bg-[#f2f4f2] h-[1px] w-full opacity-30"></div>
</header>
<!-- Main Map Canvas -->
<main class="relative h-screen w-full bg-surface-container-low overflow-hidden">
<!-- Abstract Grayscale Map Representation -->
<div class="absolute inset-0 grayscale opacity-40 mix-blend-multiply">
<img class="w-full h-full object-cover" data-alt="Minimalist grayscale aerial map of Tokyo city streets" data-location="Tokyo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOhsPwUs5bDjsTqufk8wuj60lvu2RK_JY7mFRiUlf1CpP7mw4MrUaWosmRzR0jxL4VldT85weng4YyUxql7p2DztU6KV3sSL9drDpp_IQUbnf-q4ThFVhv-DAm_UEFfE7YQJO8aUjDWlLZvErwoIdqKWVSy5GQ40iHjC0xNyrjj-vqMt1YPXK6zHskC7lzbMh7yKVnM8wM4_GHKu0fqwwE2sfykW0V0D0Aii6TMBhHI2Cf9DEcWEtS6OCjuGW0cYWrRJARO88Ad8Q"/>
</div>
<!-- Fog of War / Vignette Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-background/50 pointer-events-none"></div>
<!-- RESIDENCE Marker -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="relative">
<!-- Pulse Effect -->
<div class="absolute inset-0 animate-ping bg-primary opacity-20 rounded-full"></div>
<!-- The Marker -->
<div class="w-4 h-4 bg-primary rounded-full ring-8 ring-primary/10 relative z-10"></div>
</div>
<div class="mt-4 bg-surface-container-lowest/80 backdrop-blur-md px-4 py-1.5 rounded-full shadow-sm border border-outline-variant/10">
<span class="text-[10px] tracking-[0.2em] uppercase font-medium text-on-surface-variant">RESIDENCE</span>
</div>
</div>
<!-- Settings Floating Action (Secondary) -->
<div class="absolute top-24 right-6">
<button class="w-12 h-12 rounded-full bg-surface-container-lowest shadow-sm flex items-center justify-center hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="settings">settings</span>
</button>
</div>
<!-- Resident Preview Card (Evelyn Vance) -->
<div class="absolute bottom-32 left-6 right-6 md:left-auto md:right-10 md:w-80 animate-fade-in">
<div class="bg-surface-container-lowest/90 backdrop-blur-xl p-5 rounded-xl shadow-[0_10px_40px_rgba(45,52,50,0.06)] border border-outline-variant/10">
<div class="flex items-center gap-4">
<div class="w-14 h-14 rounded-full overflow-hidden ring-2 ring-surface-container">
<img class="w-full h-full object-cover" data-alt="Portrait of a woman with a serene expression" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDxDxNkTHbAcBOIgHqcPGbPEicHiYjK78EkpduHFbv-RyR5ZWqEkhmBCtItTsc47DOJ7wUGYMBmROVxFReBKHIaQkSfgJQTdwMODBoAsIDDU2RxF-cWhUGchlfMDNkH4EnyIdrrWw63iljihqKKfOOB32DGVLQMqo72GdgxSq6bCcV82i72SJ-0XtGABguRvVdXeS6yo_i1jggVWu-uQMA6BdqbYoQdfsg0xij2YHFpCKn716d-jp0VIaT9_j74Oy17yDxXKP9bLIg"/>
</div>
<div class="flex-1">
<h3 class="font-headline text-lg text-on-surface leading-none">Evelyn Vance</h3>
<p class="text-[11px] uppercase tracking-widest text-on-surface-variant mt-1.5 flex items-center gap-1.5">
<span class="w-1.5 h-1.5 rounded-full bg-[#A8C3B8]"></span>
                            At Home
                        </p>
</div>
<div class="bg-tertiary-container px-3 py-1 rounded-full">
<span class="text-[10px] font-medium text-on-tertiary-container uppercase tracking-tight">Calm</span>
</div>
</div>
<div class="mt-4 pt-4 border-t border-outline-variant/5 flex justify-between items-center">
<span class="text-[10px] text-outline tracking-wider">LAST ECHO: 4M AGO</span>
<button class="text-[11px] font-semibold text-primary uppercase tracking-widest flex items-center gap-1 hover:gap-2 transition-all">
                        VIEW JOURNAL <span class="material-symbols-outlined text-[14px]" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pt-3 pb-8 px-4 bg-[#f9f9f7]/90 backdrop-blur-lg rounded-t-3xl z-50 shadow-[0_-5px_30px_rgba(45,52,50,0.03)]">
<!-- Map (ACTIVE) -->
<a class="flex flex-col items-center justify-center text-[#5f5e5e] relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-[#5f5e5e] after:rounded-full transition-all duration-500 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase mt-1">Map</span>
</a>
<!-- Archive -->
<a class="flex flex-col items-center justify-center text-[#adb3b0] opacity-60 hover:text-[#5f5e5e] transition-colors active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="shelves">shelves</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase mt-1">Archive</span>
</a>
<!-- Echoes -->
<a class="flex flex-col items-center justify-center text-[#adb3b0] opacity-60 hover:text-[#5f5e5e] transition-colors active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="waves">waves</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase mt-1">Echoes</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-[#adb3b0] opacity-60 hover:text-[#5f5e5e] transition-colors active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="person_pin">person_pin</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase mt-1">Profile</span>
</a>
</nav>
<!-- Map Context Hint (Floating) -->
<div class="fixed top-24 left-1/2 -translate-x-1/2 z-40 pointer-events-none">
<div class="px-5 py-2 rounded-full bg-on-background/5 backdrop-blur-sm border border-on-surface/5">
<p class="text-[10px] font-medium tracking-[0.3em] uppercase text-on-surface/40">Observing Shibuya Sector</p>
</div>
</div>
</body></html>
