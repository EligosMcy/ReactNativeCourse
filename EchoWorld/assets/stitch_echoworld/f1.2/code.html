<!DOCTYPE html>

              "on-tertiary-fixed-variant": "#665b6e",

              "surface-variant": "#dee4e0",
              "on-secondary-fixed-variant": "#4e5d6a",
              "primary": "#5f5e5e",
              "on-secondary": "#f5f9ff",
              "surface-dim": "#d4dcd8",
              "inverse-on-surface": "#9c9d9b",
              "on-primary": "#faf7f6",
              "surface-bright": "#f9f9f7",

              "on-tertiary-fixed": "#493f51",

              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f9f9f7;
            color: #2d3432;
        }
        .ethereal-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f7]/80 backdrop-blur-xl shadow-[0_10px_40px_rgba(45,52,50,0.04)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform text-[#5f5e5e] hover:opacity-70">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-noto-serif text-xl tracking-[0.2em] text-[#2d3432] uppercase">ECHOWORLD</h1>
</div>
<button class="active:scale-95 transition-transform text-[#5f5e5e] hover:opacity-70">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
<div class="bg-[#f2f4f2] h-[1px] w-full opacity-30"></div>
</header>
<!-- Main Content -->
<main class="pt-24 pb-32 px-6 max-w-screen-md mx-auto">
<!-- Header Section -->
<section class="mb-16">
<h2 class="font-headline text-3xl text-on-surface mb-3">修改头像</h2>
<p class="text-secondary font-light tracking-wide text-sm opacity-80">
                选择一个能够代表您当前心境的影像。
            </p>
</section>
<!-- Current Preview (The Curator's Circle) -->
<div class="flex justify-center mb-20 relative">
<div class="relative group">
<div class="w-40 h-40 rounded-full bg-surface-container-low p-1 ring-1 ring-outline-variant/20">
<img alt="Current Avatar" class="w-full h-full object-cover rounded-full grayscale-[20%] group-hover:grayscale-0 transition-all duration-700" data-alt="Close up portrait of a calm individual" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWbhV6JS0fD8gtmMjx5fUKVYaICNmv17zvzJmFtfYh2TC_Vx8JuCeljy8oSxx6tGdvfYwwBMOiXdPquqTx-CCQ1HcpQcos93IY8B7ii7Egs_uCT7Ovf7mqbup0x7_6xYw1nuEh2MK25ymS0VdO4gs9pKp1LyGpOK6VTUuVd84QuqTVl4Adx8tLOOX618aIct6EbNEoca_QAe7fPA6nsfaB-txahpQakf67xIXFLJxI_jmxQkFMdGE7iCUk1AS4RJNbJJVGXVGU4mY"/>
</div>
<div class="absolute -bottom-2 right-4 bg-primary text-on-primary w-8 h-8 rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
</div>
</div>
</div>
<!-- Action Hub (Asymmetric Grid) -->
<div class="grid grid-cols-1 gap-6">
<!-- Option: Camera -->
<button class="group flex items-center p-6 bg-surface-container-low rounded-xl transition-all duration-500 hover:bg-surface-container hover:shadow-[0_15px_45px_rgba(45,52,50,0.05)] text-left">
<div class="w-12 h-12 flex items-center justify-center bg-surface-container-highest rounded-full text-primary group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
</div>
<div class="ml-6 flex-1">
<h3 class="text-on-surface font-medium text-lg tracking-tight">拍摄照片</h3>
<p class="text-on-surface-variant text-sm font-light mt-1">即刻记录当下的真实神采</p>
</div>
<span class="material-symbols-outlined text-outline-variant opacity-0 group-hover:opacity-100 transition-opacity translate-x-2" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option: Upload -->
<button class="group flex items-center p-6 bg-surface-container-low rounded-xl transition-all duration-500 hover:bg-surface-container hover:shadow-[0_15px_45px_rgba(45,52,50,0.05)] text-left">
<div class="w-12 h-12 flex items-center justify-center bg-surface-container-highest rounded-full text-primary group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined" data-icon="image">image</span>
</div>
<div class="ml-6 flex-1">
<h3 class="text-on-surface font-medium text-lg tracking-tight">上传图片</h3>
<p class="text-on-surface-variant text-sm font-light mt-1">从您的本地档案中进行挑选</p>
</div>
<span class="material-symbols-outlined text-outline-variant opacity-0 group-hover:opacity-100 transition-opacity translate-x-2" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option: Default -->
<button class="group flex items-center p-6 bg-surface-container-low rounded-xl transition-all duration-500 hover:bg-surface-container hover:shadow-[0_15px_45px_rgba(45,52,50,0.05)] text-left">
<div class="w-12 h-12 flex items-center justify-center bg-surface-container-highest rounded-full text-primary group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined" data-icon="face">face</span>
</div>
<div class="ml-6 flex-1">
<h3 class="text-on-surface font-medium text-lg tracking-tight">使用默认头像</h3>
<p class="text-on-surface-variant text-sm font-light mt-1">回归最简粹的视觉身份符号</p>
</div>
<span class="material-symbols-outlined text-outline-variant opacity-0 group-hover:opacity-100 transition-opacity translate-x-2" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Helpful Suggestion Card -->
<div class="mt-20 p-8 border border-outline-variant/10 rounded-xl bg-surface-container-lowest text-center">
<span class="material-symbols-outlined text-tertiary/40 mb-4" data-icon="lightbulb">lightbulb</span>
<p class="text-secondary text-sm font-light leading-relaxed max-w-xs mx-auto italic">
                “一幅精选的肖像，如同在这片数字荒野中竖起的一盏明灯。”
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pt-3 pb-8 px-4 bg-[#f9f9f7]/90 backdrop-blur-lg z-50 shadow-[0_-5px_30px_rgba(45,52,50,0.03)] rounded-t-3xl">
<a class="flex flex-col items-center justify-center text-[#adb3b0] opacity-60 hover:text-[#5f5e5e] transition-colors active:scale-90 duration-500" href="#">
<span class="material-symbols-outlined mb-1" data-icon="map">map</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase">Map</span>
</a>
<a class="flex flex-col items-center justify-center text-[#adb3b0] opacity-60 hover:text-[#5f5e5e] transition-colors active:scale-90 duration-500" href="#">
<span class="material-symbols-outlined mb-1" data-icon="shelves">shelves</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase">Archive</span>
</a>
<a class="flex flex-col items-center justify-center text-[#adb3b0] opacity-60 hover:text-[#5f5e5e] transition-colors active:scale-90 duration-500" href="#">
<span class="material-symbols-outlined mb-1" data-icon="waves">waves</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase">Echoes</span>
</a>
<a class="flex flex-col items-center justify-center text-[#5f5e5e] relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-[#5f5e5e] after:rounded-full active:scale-90 transition-all duration-500" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person_pin" style="font-variation-settings: 'FILL' 1;">person_pin</span>
<span class="font-sans text-[10px] tracking-[0.1em] uppercase">Profile</span>
</a>
</nav>
</body></html>
