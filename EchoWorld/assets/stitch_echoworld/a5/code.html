<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e5e9e6",
              "on-error-container": "#752121",
              "tertiary": "#665b6e",
              "surface-container": "#ecefec",
              "surface-tint": "#5f5e5e",
              "on-tertiary": "#fff6ff",
              "tertiary-container": "#f2e3fa",
              "on-background": "#2d3432",
              "background": "#f9f9f7",
              "primary-fixed-dim": "#d6d4d3",
              "surface": "#f9f9f7",
              "secondary-fixed": "#d4e5f4",
              "on-secondary-fixed": "#32414d",
              "on-primary-fixed-variant": "#5c5b5b",
              "secondary": "#51616e",
              "on-primary-container": "#525151",
              "surface-container-highest": "#dee4e0",
              "error-dim": "#4e0309",
              "primary-fixed": "#e4e2e1",
              "tertiary-fixed-dim": "#e3d5eb",
              "on-error": "#fff7f6",
              "outline-variant": "#adb3b0",
              "on-surface": "#2d3432",
              "error": "#9f403d",
              "tertiary-fixed": "#f2e3fa",
              "surface-container-low": "#f2f4f2",
              "on-tertiary-fixed-variant": "#665b6e",
              "outline": "#767c79",
              "tertiary-dim": "#594f61",
              "primary-container": "#e4e2e1",
              "on-primary-fixed": "#3f3f3f",
              "secondary-container": "#d4e5f4",
              "surface-variant": "#dee4e0",
              "on-secondary-fixed-variant": "#4e5d6a",
              "primary": "#5f5e5e",
              "on-secondary": "#f5f9ff",
              "surface-dim": "#d4dcd8",
              "inverse-on-surface": "#9c9d9b",
              "on-primary": "#faf7f6",
              "surface-bright": "#f9f9f7",
              "primary-dim": "#535252",
              "on-tertiary-fixed": "#493f51",
              "on-secondary-container": "#445460",
              "secondary-fixed-dim": "#c6d6e6",
              "on-surface-variant": "#5a605e",
              "inverse-surface": "#0c0f0e",
              "secondary-dim": "#455562",
              "on-tertiary-container": "#5b5163",
              "surface-container-lowest": "#ffffff",
              "error-container": "#fe8983",
              "inverse-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(249, 249, 247, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9f7]/80 dark:bg-[#2d3432]/80 backdrop-blur-xl shadow-[0_10px_40px_rgba(45,52,50,0.04)]">
<div class="flex items-center justify-between px-6 h-16 w-full">
<button class="text-[#5f5e5e] dark:text-[#e4e2e1] active:scale-95 transition-transform hover:opacity-70 transition-opacity duration-300">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-noto-serif text-xl tracking-[0.2em] text-[#2d3432] dark:text-[#faf7f6] uppercase">ECHOWORLD</h1>
<button class="text-[#5f5e5e] dark:text-[#e4e2e1] active:scale-95 transition-transform hover:opacity-70 transition-opacity duration-300">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
<div class="bg-[#f2f4f2] dark:bg-[#3d4442] h-[1px] w-full opacity-30"></div>
</header>
<!-- Main Content -->
<main class="w-full max-w-xl px-8 py-24 flex flex-col items-center text-center">
<!-- Animated Visual Section -->
<div class="relative w-full aspect-square max-w-[280px] mb-12 flex items-center justify-center">
<!-- Background "Ethereal" Glow -->
<div class="absolute inset-0 bg-surface-container-low rounded-full scale-110 opacity-50 blur-3xl"></div>
<!-- Stylized Envelope Icon Container -->
<div class="relative z-10 w-48 h-48 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-[0_20px_60px_rgba(45,52,50,0.05)] border border-white/20">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-6xl text-primary opacity-80" data-icon="mail" style="font-variation-settings: 'wght' 100, 'opsz' 48;">mail</span>
<div class="mt-4 flex space-x-1">
<span class="w-1.5 h-1.5 rounded-full bg-vitality-mint bg-[#A8C3B8] opacity-60"></span>
<span class="w-1.5 h-1.5 rounded-full bg-vitality-mint bg-[#A8C3B8] opacity-40"></span>
<span class="w-1.5 h-1.5 rounded-full bg-vitality-mint bg-[#A8C3B8] opacity-20"></span>
</div>
</div>
</div>
<!-- Floating Decoration Elements -->
<div class="absolute -top-4 -right-4 w-12 h-12 bg-tertiary-container rounded-full opacity-40 blur-xl"></div>
<div class="absolute bottom-4 -left-8 w-16 h-16 bg-secondary-container rounded-full opacity-30 blur-2xl"></div>
</div>
<!-- Typography Section -->
<div class="space-y-6 max-w-md mx-auto">
<h2 class="font-headline text-3xl text-on-surface tracking-tight leading-snug">
                查收您的数字信函
            </h2>
<p class="text-on-surface-variant font-body leading-relaxed text-balance">
                为了确保您的数字档案安全，我们已向您的注册邮箱发送了一封带有验证链接的信件。请在 <span class="font-medium text-on-surface">15 分钟</span> 内完成确认。
            </p>
</div>
<!-- Action Section -->
<div class="mt-16 w-full space-y-8">
<button class="w-full py-4 px-8 bg-primary text-on-primary rounded-xl font-label tracking-widest text-sm font-medium hover:opacity-90 active:scale-[0.98] transition-all duration-300 shadow-[0_4px_12px_rgba(95,94,94,0.15)]">
                已验证，进入
            </button>
<div class="flex flex-col items-center space-y-4">
<div class="flex items-center space-x-2 text-on-surface-variant text-sm">
<span class="material-symbols-outlined text-[18px]" data-icon="schedule">schedule</span>
<span class="font-label tracking-tighter">00:59</span>
</div>
<div class="flex items-center space-x-1">
<span class="text-outline-variant text-xs">没有收到邮件？</span>
<button class="text-secondary font-medium text-xs tracking-wider border-b border-secondary/20 hover:border-secondary transition-all">
                        重新发送验证码
                    </button>
</div>
</div>
</div>
<!-- Subtext/Note Section -->
<div class="mt-20 p-6 bg-surface-container-low/50 rounded-2xl max-w-sm text-left relative overflow-hidden">
<div class="absolute top-0 right-0 p-2 opacity-10">
<span class="material-symbols-outlined text-4xl" data-icon="info">info</span>
</div>
<p class="text-[11px] text-on-surface-variant/80 font-body leading-relaxed">
<strong class="text-on-surface block mb-1">小贴士</strong>
                如果您的收件箱没有出现该信件，请检查“垃圾邮件”或“订阅”分类。有时数字回响需要一些时间才能抵达。
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full rounded-t-3xl z-50 bg-[#f9f9f7]/90 dark:bg-[#2d3432]/90 backdrop-blur-lg shadow-[0_-5px_30px_rgba(45,52,50,0.03)] hidden md:flex">
<!-- Hidden on Mobile by default per the shell visibility & relevance logic as this is a focused/transactional journey stage, but implemented as requested by system rules -->
</nav>
<!-- Decorative Canvas Overlay -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-1/4 -right-20 w-[400px] h-[400px] bg-primary-container/20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 -left-20 w-[400px] h-[400px] bg-secondary-container/10 rounded-full blur-[100px]"></div>
</div>
</body></html>
