<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f7;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .ethereal-blur {
            filter: blur(80px);
            opacity: 0.4;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface h-screen w-full flex flex-col items-center justify-center overflow-hidden">
<!-- Atmospheric Depth Elements -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-secondary-container/30 ethereal-blur"></div>
<div class="absolute top-[20%] -right-[5%] w-[40%] h-[60%] rounded-full bg-tertiary-container/20 ethereal-blur"></div>
<div class="absolute -bottom-[15%] left-[20%] w-[60%] h-[40%] rounded-full bg-surface-container-highest/40 ethereal-blur"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-between h-full w-full py-24 px-8">
<!-- Empty top spacer for centering the middle logo -->
<div class="w-full"></div>
<!-- Center Identity: ECHOWORLD -->
<div class="flex flex-col items-center gap-6">
<h1 class="font-headline text-4xl md:text-5xl tracking-[0.4em] text-on-surface font-light opacity-90">
                ECHOWORLD
            </h1>
<!-- Subtle secondary decorative element -->
<div class="w-12 h-[1px] bg-outline-variant/30"></div>
</div>
<!-- Bottom Loading Logic -->
<div class="flex flex-col items-center w-full max-w-[280px] space-y-8">
<!-- Progress Bar Container -->
<div class="w-full h-[1px] bg-surface-container-highest relative overflow-hidden">
<!-- Progress Indicator (Animated in intent, static here per instructions) -->
<div class="absolute left-0 top-0 h-full w-[35%] bg-primary opacity-60"></div>
</div>
<!-- Status Text -->
<div class="flex flex-col items-center space-y-2">
<span class="font-body text-[10px] tracking-[0.2em] uppercase text-on-surface-variant/70">
                    正在开启...
                </span>
<!-- Narrative tag using Design System "Emotional Nuance" logic -->
<div class="px-3 py-1 bg-tertiary-container/40 rounded-full">
<span class="text-[8px] font-label tracking-widest text-on-tertiary-container/60 uppercase">
                        The Digital Curator
                    </span>
</div>
</div>
</div>
</main>
<!-- Visual Polish: Soft Vignette -->
<div class="absolute inset-0 pointer-events-none ring-[40px] ring-inset ring-background/10"></div>
