<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Noto+Serif:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#e5e9e6",
              "on-error-container": "#752121",
              "tertiary": "#665b6e",
              "surface-container": "#ecefec",
              "surface-tint": "#5f5e5e",
              "on-tertiary": "#fff6ff",
              "tertiary-container": "#f2e3fa",
              "on-background": "#2d3432",
              "background": "#f9f9f7",
              "primary-fixed-dim": "#d6d4d3",
              "surface": "#f9f9f7",
              "secondary-fixed": "#d4e5f4",
              "on-secondary-fixed": "#32414d",
              "on-primary-fixed-variant": "#5c5b5b",
              "secondary": "#51616e",
              "on-primary-container": "#525151",
              "surface-container-highest": "#dee4e0",
              "error-dim": "#4e0309",
              "primary-fixed": "#e4e2e1",
              "tertiary-fixed-dim": "#e3d5eb",
              "on-error": "#fff7f6",
              "outline-variant": "#adb3b0",
              "on-surface": "#2d3432",
              "error": "#9f403d",
              "tertiary-fixed": "#f2e3fa",
              "surface-container-low": "#f2f4f2",
              "on-tertiary-fixed-variant": "#665b6e",
              "outline": "#767c79",
              "tertiary-dim": "#594f61",
              "primary-container": "#e4e2e1",
              "on-primary-fixed": "#3f3f3f",
              "secondary-container": "#d4e5f4",
              "surface-variant": "#dee4e0",
              "on-secondary-fixed-variant": "#4e5d6a",
              "primary": "#5f5e5e",
              "on-secondary": "#f5f9ff",
              "surface-dim": "#d4dcd8",
              "inverse-on-surface": "#9c9d9b",
              "on-primary": "#faf7f6",
              "surface-bright": "#f9f9f7",
              "primary-dim": "#535252",
              "on-tertiary-fixed": "#493f51",
              "on-secondary-container": "#445460",
              "secondary-fixed-dim": "#c6d6e6",
              "on-surface-variant": "#5a605e",
              "inverse-surface": "#0c0f0e",
              "secondary-dim": "#455562",
              "on-tertiary-container": "#5b5163",
              "surface-container-lowest": "#ffffff",
              "error-container": "#fe8983",
              "inverse-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      .ghost-border {
        border-bottom: 1px solid rgba(173, 179, 176, 0.15);
      }
      .input-focus-border:focus-within {
        border-bottom: 1px solid #51616e;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container antialiased overflow-hidden">
<!-- Top Navigation Anchor (Manual Suppression of Shared Nav for Focus Journey) -->
<header class="fixed top-0 left-0 w-full h-20 px-8 flex items-center justify-between z-50">
<button class="flex items-center gap-2 group transition-opacity hover:opacity-70">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-headline text-xs tracking-[0.3em] text-outline opacity-40 uppercase">ECHOWORLD</div>
</header>
<main class="relative min-h-screen flex flex-col items-center justify-center px-6">
<!-- Abstract Atmospheric Background Element -->
<div class="absolute inset-0 -z-10 overflow-hidden">
<div class="absolute top-[10%] left-[15%] w-[40vw] h-[40vw] rounded-full bg-surface-container-high opacity-40 blur-[120px]"></div>
<div class="absolute bottom-[5%] right-[10%] w-[30vw] h-[30vw] rounded-full bg-secondary-container opacity-20 blur-[100px]"></div>
</div>
<section class="w-full max-w-md flex flex-col gap-16">
<!-- Branding/Title Section -->
<div class="space-y-4">
<span class="inline-block text-[10px] tracking-[0.2em] text-secondary font-label uppercase opacity-60">Identity Registration</span>
<h1 class="font-headline text-4xl md:text-5xl text-on-surface leading-tight tracking-tight">
                    开始你的<br/>数字策展
                </h1>
</div>
<!-- Registration Form -->
<form class="space-y-12">
<div class="relative group">
<label class="block text-[11px] tracking-[0.1em] text-outline-variant font-medium uppercase mb-2" for="email">
                        电子邮箱
                    </label>
<div class="relative ghost-border input-focus-border transition-all duration-500 pb-2">
<input class="w-full bg-transparent border-none p-0 text-lg font-body placeholder:text-outline-variant/40 focus:ring-0 text-on-surface" id="email" name="email" placeholder="curator@echoworld.com" required="" type="email"/>
</div>
</div>
<div class="pt-4 flex flex-col gap-8">
<button class="group relative w-full h-14 bg-primary text-on-primary rounded-xl flex items-center justify-center gap-3 overflow-hidden transition-all duration-300 hover:shadow-[0_10px_40px_rgba(45,52,50,0.1)] active:scale-[0.98]" type="submit">
<span class="font-body font-medium tracking-wide">下一步</span>
<span class="material-symbols-outlined transition-transform duration-300 group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-[12px] text-on-surface-variant/60 leading-relaxed text-center max-w-[280px] mx-auto">
                        继续操作即表示您同意我们的策展人协议与隐私条款。
                    </p>
</div>
</form>
</section>
<!-- Aesthetic Detail Footer -->
<footer class="absolute bottom-12 w-full px-8 flex justify-between items-center opacity-30">
<div class="flex gap-4">
<div class="w-1.5 h-1.5 rounded-full bg-primary-dim"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/30"></div>
</div>
<span class="font-headline text-sm italic">Residency V1.0</span>
</footer>
</main>
<!-- Visual Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] contrast-150 mix-blend-multiply" data-alt="Subtle noise and grain texture overlay">
<svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<filter id="noise">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noise)" height="100%" width="100%"></rect>
</svg>
</div>
</body></html>
