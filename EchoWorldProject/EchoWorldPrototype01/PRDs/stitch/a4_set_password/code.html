<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Noto+Serif:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#eae8e5",
              "outline": "#80756a",
              "on-secondary-fixed": "#211b14",
              "on-primary-fixed-variant": "#5a431f",
              "background": "#fbf9f6",
              "on-background": "#1b1c1a",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#1b1c1a",
              "on-secondary": "#ffffff",
              "inverse-on-surface": "#f2f0ed",
              "tertiary-fixed": "#c5ebd5",
              "on-error": "#ffffff",
              "on-surface-variant": "#4e453b",
              "on-tertiary-fixed": "#002114",
              "on-secondary-container": "#6a6158",
              "tertiary-container": "#587b68",
              "surface-variant": "#e4e2df",
              "on-tertiary-container": "#eefff3",
              "on-primary-fixed": "#291800",
              "surface-tint": "#745a34",
              "primary-fixed-dim": "#e3c193",
              "primary-container": "#8b6f47",
              "inverse-primary": "#e3c193",
              "outline-variant": "#d1c4b7",
              "inverse-surface": "#30312f",
              "on-tertiary": "#ffffff",
              "secondary": "#665d54",
              "tertiary-fixed-dim": "#aacfb9",
              "surface": "#fbf9f6",
              "error": "#ba1a1a",
              "error-container": "#ffdad6",
              "surface-dim": "#dbdad7",
              "primary": "#705731",
              "secondary-container": "#eaddd2",
              "on-secondary-fixed-variant": "#4d453d",
              "on-primary": "#ffffff",
              "secondary-fixed": "#ede0d5",
              "primary-fixed": "#ffddb1",
              "surface-container-highest": "#e4e2df",
              "on-tertiary-fixed-variant": "#2c4d3d",
              "on-primary-container": "#fffaf8",
              "on-error-container": "#93000a",
              "surface-container-low": "#f5f3f0",
              "surface-container": "#efeeeb",
              "surface-bright": "#fbf9f6",
              "tertiary": "#406251",
              "secondary-fixed-dim": "#d1c4b9"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .serif-display {
            font-family: 'Noto Serif', serif;
            letter-spacing: 0.05em;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body selection:bg-primary-fixed selection:text-on-primary-fixed overflow-x-hidden">
<!-- Top Navigation (Shell suppressed as per Transactional rule, but using TopAppBar as anchor) -->
<header class="flex justify-between items-center px-6 h-16 w-full fixed top-0 z-50 bg-[#fbf9f6] dark:bg-[#1A1714]">
<button class="text-[#705731] dark:text-[#8B6F47] hover:opacity-80 transition-opacity duration-300">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-widest text-[#705731] dark:text-[#8B6F47] font-['Noto_Serif'] uppercase">ECHOWORLD</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<main class="pt-24 pb-12 px-6 max-w-lg mx-auto min-h-screen flex flex-col">
<!-- Hero Illustration / Visual Anchor -->
<div class="mb-12 relative h-64 w-full rounded-lg overflow-hidden bg-surface-container-low">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/10 to-transparent"></div>
<img class="w-full h-full object-cover opacity-90 mix-blend-multiply" data-alt="Minimalist architectural detail of a sunlit stone staircase with soft shadows and organic textures" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB-1RokOjwU-qfDY516iWYZqzRxHGdAJnEiJBlh_31Tyf0QjBTxCRsQw_NPwh8jixuxqvKOl3hS_7Vw3Ifk-Q7NWt-3NHDLktMJuPU10msb4nqNOhRtcKWFWDM_AK_fPY1SUC-g4R-oEt4giXkU7NyrnIev0gpnxQb93lr0EHipIoIDt7ws3iyyWgT9igwI1CcixNKk9diRobmHtNhc7SsQbkOQytzKgmJFu8h5wRLamXxRuzFSD6U_2eMB0nQw9OVEIXjGUD2H6wr_"/>
<div class="absolute bottom-6 left-6 right-6">
<h2 class="serif-display text-3xl font-light text-primary leading-tight">
                    设置密码
                </h2>
<p class="text-secondary mt-2 text-sm tracking-wide">
                    The security of your residence begins here.
                </p>
</div>
</div>
<!-- Form Section -->
<section class="flex-grow space-y-10">
<div class="space-y-8">
<!-- Input Group 1 -->
<div class="relative group">
<label class="block text-xs font-medium text-secondary uppercase tracking-[0.2em] mb-2 px-1" for="password">
                        设置新密码
                    </label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 transition-all duration-400 py-3 text-lg font-body placeholder:text-outline-variant/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 bottom-3 text-secondary hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Input Group 2 -->
<div class="relative group">
<label class="block text-xs font-medium text-secondary uppercase tracking-[0.2em] mb-2 px-1" for="confirm-password">
                        确认密码
                    </label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 transition-all duration-400 py-3 text-lg font-body placeholder:text-outline-variant/50" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Password Requirements (The "Bento" Info Card) -->
<div class="bg-surface-container-low p-6 rounded-lg space-y-4">
<h3 class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="shield">shield</span>
                    安全准则
                </h3>
<ul class="space-y-3">
<li class="flex items-start gap-3 text-sm text-secondary">
<span class="material-symbols-outlined text-tertiary text-[18px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span>密码长度至少为 8 个字符</span>
</li>
<li class="flex items-start gap-3 text-sm text-secondary">
<span class="material-symbols-outlined text-tertiary text-[18px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span>包含大写或小写字母</span>
</li>
<li class="flex items-start gap-3 text-sm text-secondary">
<span class="material-symbols-outlined text-outline-variant text-[18px]" data-icon="radio_button_unchecked">radio_button_unchecked</span>
<span>包含至少一个数字</span>
</li>
</ul>
</div>
</section>
<!-- Action Section -->
<footer class="mt-12 space-y-6">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container py-5 rounded-lg font-medium text-lg shadow-[0_4px_40px_rgba(112,87,49,0.15)] hover:opacity-95 active:scale-[0.98] transition-all duration-300">
                创建账户
            </button>
<p class="text-center text-xs text-secondary leading-relaxed px-4">
                点击“创建账户”即表示您同意我们的<br/>
<a class="text-primary underline decoration-primary/20 hover:decoration-primary transition-all" href="#">服务条款</a> 与 <a class="text-primary underline decoration-primary/20 hover:decoration-primary transition-all" href="#">隐私政策</a>
</p>
</footer>
</main>
<!-- Bottom Ornament (Asymmetric layout element) -->
<div class="fixed bottom-0 right-0 w-32 h-32 opacity-5 pointer-events-none translate-x-12 translate-y-12">
<span class="material-symbols-outlined text-[10rem] text-primary" data-icon="fingerprint">fingerprint</span>
</div>
</body></html>
