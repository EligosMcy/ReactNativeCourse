<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@300;400;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#eae8e5",
              "outline": "#80756a",
              "on-secondary-fixed": "#211b14",
              "on-primary-fixed-variant": "#5a431f",
              "background": "#fbf9f6",
              "on-background": "#1b1c1a",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#1b1c1a",
              "on-secondary": "#ffffff",
              "inverse-on-surface": "#f2f0ed",
              "tertiary-fixed": "#c5ebd5",
              "on-error": "#ffffff",
              "on-surface-variant": "#4e453b",
              "on-tertiary-fixed": "#002114",
              "on-secondary-container": "#6a6158",
              "tertiary-container": "#587b68",
              "surface-variant": "#e4e2df",
              "on-tertiary-container": "#eefff3",
              "on-primary-fixed": "#291800",
              "surface-tint": "#745a34",
              "primary-fixed-dim": "#e3c193",
              "primary-container": "#8b6f47",
              "inverse-primary": "#e3c193",
              "outline-variant": "#d1c4b7",
              "inverse-surface": "#30312f",
              "on-tertiary": "#ffffff",
              "secondary": "#665d54",
              "tertiary-fixed-dim": "#aacfb9",
              "surface": "#fbf9f6",
              "error": "#ba1a1a",
              "error-container": "#ffdad6",
              "surface-dim": "#dbdad7",
              "primary": "#705731",
              "secondary-container": "#eaddd2",
              "on-secondary-fixed-variant": "#4d453d",
              "on-primary": "#ffffff",
              "secondary-fixed": "#ede0d5",
              "primary-fixed": "#ffddb1",
              "surface-container-highest": "#e4e2df",
              "on-tertiary-fixed-variant": "#2c4d3d",
              "on-primary-container": "#fffaf8",
              "on-error-container": "#93000a",
              "surface-container-low": "#f5f3f0",
              "surface-container": "#efeeeb",
              "surface-bright": "#fbf9f6",
              "tertiary": "#406251",
              "secondary-fixed-dim": "#d1c4b9"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #fbf9f6;
        color: #1b1c1a;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body selection:bg-primary-fixed selection:text-on-primary-fixed antialiased">
<!-- The Shell Suppression Rule: TopAppBar and BottomNavBar are hidden for this Transactional screen -->
<main class="min-h-screen flex flex-col md:flex-row overflow-hidden">
<!-- Left Side: Editorial Image (Asymmetric Canvas) -->
<section class="hidden md:flex md:w-1/2 lg:w-3/5 bg-surface-container-low relative items-center justify-center p-20">
<div class="absolute inset-0 z-0">
<img alt="Minimalist study room" class="w-full h-full object-cover grayscale-[0.2] brightness-95 opacity-90" data-alt="Minimalist interior design with a single designer chair, warm natural sunlight streaming through a window creating soft long shadows on warm beige walls" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqQPT2febOW13ZXRVKWZ4F9IvaiAk0rHHBZRKHFaQmjtecoT6oPJyS8H9nqcI-9AWiAd5iwfbRwowWm9Di-tVY0YFYjmsA-eI6MV3ijKJRKFDUEhQRCO9BaDvUKMpbZGa_66lhEHHcmo_vaLAGWxjryDSDAImPrLh1sSVjel2o3-v4QFUjSqjk0lKrPKbJaOyjswmuUmS19FDs2oDVs-My6PxSPjfQRM4UQT9Xw85dv4Eu-DNSV9wikwnmQfUEMGytC_wc65_LP3TD"/>
<div class="absolute inset-0 bg-gradient-to-tr from-surface/40 to-transparent"></div>
</div>
<div class="relative z-10 max-w-lg">
<h2 class="font-headline text-5xl font-light tracking-widest text-on-surface leading-tight mb-8">
                    ECHOWORLD
                </h2>
<p class="font-headline text-2xl text-on-surface-variant italic font-light tracking-wide leading-relaxed">
                    "Find peace in the digital noise. Join our curated sanctuary of focused connection."
                </p>
</div>
</section>
<!-- Right Side: Interaction Layer -->
<section class="flex-1 flex flex-col justify-center items-center px-8 py-12 md:px-16 lg:px-24 bg-surface">
<div class="w-full max-w-md">
<!-- Branding for Mobile -->
<div class="md:hidden mb-12 flex justify-center">
<span class="font-headline text-2xl font-bold tracking-widest text-primary uppercase">ECHOWORLD</span>
</div>
<!-- Header Cluster -->
<header class="mb-12 space-y-4">
<h1 class="font-headline text-4xl font-light tracking-tight text-on-surface">
                        创建账户
                    </h1>
<p class="text-on-surface-variant font-body text-lg font-light tracking-wide opacity-80">
                        用邮箱开始
                    </p>
</header>
<!-- Form Section -->
<form class="space-y-10">
<!-- Input Field -->
<div class="relative group">
<label class="block text-xs font-medium text-secondary uppercase tracking-[0.2em] mb-2 px-1" for="email">
                            邮箱地址
                        </label>
<input class="w-full bg-transparent border-t-0 border-l-0 border-r-0 border-b border-outline-variant focus:border-primary focus:ring-0 py-3 px-1 text-on-surface font-body placeholder:text-outline-variant/60 transition-all duration-300" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Primary Action -->
<div class="pt-6">
<button class="group relative w-full h-16 bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-label text-base font-semibold tracking-widest rounded-lg shadow-xl shadow-primary/10 hover:shadow-primary/20 hover:opacity-95 transition-all duration-300 flex items-center justify-center gap-3" type="submit">
<span>继续</span>
<span class="material-symbols-outlined text-[20px] translate-x-0 group-hover:translate-x-1 transition-transform duration-300" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 py-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-[10px] font-bold text-outline uppercase tracking-widest">或通过</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Social Options (Tonal Layering) -->
<div class="grid grid-cols-1 gap-4">
<button class="w-full h-14 bg-surface-container-low hover:bg-surface-container-highest text-on-surface font-body text-sm font-medium rounded-lg transition-colors duration-300 flex items-center justify-center gap-3" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="google">google</span>
                            使用 Google 注册
                        </button>
</div>
</form>
<!-- Footer Link -->
<footer class="mt-16 text-center">
<p class="text-on-surface-variant text-sm font-light">
                        已有账户？ 
                        <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 transition-all ml-1" href="#">
                            登录
                        </a>
</p>
</footer>
<!-- Legal/Trust (Subtle Metadata) -->
<div class="mt-24 text-center">
<p class="text-[10px] text-outline-variant font-medium tracking-widest leading-loose max-w-xs mx-auto">
                        点击继续即表示您同意我们的服务条款和隐私权政策。
                    </p>
</div>
</div>
</section>
</main>
<!-- Floating Ornamental Element (The Residence Touch) -->
<div class="fixed top-8 right-8 pointer-events-none hidden lg:block">
<div class="w-12 h-12 rounded-full bg-surface-container-highest/40 backdrop-blur-md flex items-center justify-center border border-outline-variant/20">
<span class="material-symbols-outlined text-primary/60 text-[18px]" data-icon="nest_eco_leaf">nest_eco_leaf</span>
</div>
</div>
</body></html>
