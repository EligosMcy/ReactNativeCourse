<body class="font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top Navigation Anchor (Manual suppression of global nav for transactional screen) -->

<main class="min-h-screen pt-24 pb-12 px-6 flex flex-col items-center max-w-lg mx-auto">

<section class="w-full mb-12 text-center md:text-left">
<h1 class="font-headline text-4xl font-light tracking-wide text-on-surface mb-2">登录</h1>
<p class="font-body text-secondary tracking-tight">欢迎回来</p>
</section>
<!-- Aesthetic Card Composition -->
<div class="w-full bg-surface-container-low rounded-xl p-8 md:p-10 space-y-8">
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-xs uppercase tracking-widest text-secondary ml-1">邮箱地址</label>
<input class="w-full bg-surface border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-1 py-3 transition-colors duration-300 placeholder:text-outline-variant/60 text-on-surface" placeholder="example@echoworld.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label text-xs uppercase tracking-widest text-secondary ml-1">密码</label>
<input class="w-full bg-surface border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-1 py-3 transition-colors duration-300 placeholder:text-outline-variant/60 text-on-surface" placeholder="••••••••" type="password"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-medium py-4 rounded-lg shadow-sm hover:opacity-90 transition-all duration-300 active:scale-[0.98]" type="submit">
                    登录
                </button>
</form>
<!-- Divider -->
<div class="relative flex items-center justify-center py-2">
<div class="w-full h-px bg-outline-variant opacity-30"></div>
<span class="absolute px-4 bg-surface-container-low font-label text-xs text-secondary uppercase tracking-widest">或</span>
</div>
<!-- Secondary Actions -->
<div class="space-y-4">
<button class="w-full bg-surface-container-highest text-primary font-medium py-4 rounded-lg hover:bg-surface-container-high transition-colors duration-300 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="smartphone">smartphone</span>
                    验证码登录
                </button>
</div>
</div>
<!-- Footer Links -->
<footer class="mt-8 flex flex-col items-center gap-4">
<a class="text-primary text-sm font-medium border-b border-transparent hover:border-primary transition-all duration-300" href="#">
                忘记密码？
            </a>
<p class="text-secondary text-xs mt-4">
                还没有账号？ <a class="text-primary font-semibold" href="#">立即加入</a>
