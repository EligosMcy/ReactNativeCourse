<!DOCTYPE html>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
      }
      body {
        background-color: #fbf9f6;
        color: #1b1c1a;
        font-family: 'Inter', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center">
<!-- Top Navigation Anchor -->
<header class="flex justify-between items-center px-6 h-16 w-full fixed top-0 z-50 bg-[#fbf9f6] dark:bg-[#1A1714]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#705731] dark:text-[#8B6F47] cursor-pointer">arrow_back</span>
</div>
<h1 class="font-['Noto_Serif'] font-light tracking-widest uppercase text-xl font-bold text-[#705731] dark:text-[#8B6F47]">ECHOWORLD</h1>
<div class="flex items-center">
<span class="material-symbols-outlined text-[#705731] dark:text-[#8B6F47] cursor-pointer">account_circle</span>
</div>
</header>
<main class="w-full max-w-md px-8 pt-24 pb-32 flex-grow flex flex-col items-center">
<!-- Progress Indicator -->
<div class="w-full mb-12 flex flex-col items-center gap-3">
<div class="flex gap-2 w-full justify-center">
<div class="h-1 w-12 rounded-full bg-primary"></div>
<div class="h-1 w-12 rounded-full bg-surface-container-highest"></div>
<div class="h-1 w-12 rounded-full bg-surface-container-highest"></div>
<div class="h-1 w-12 rounded-full bg-surface-container-highest"></div>
<div class="h-1 w-12 rounded-full bg-surface-container-highest"></div>
</div>
<span class="font-label text-xs tracking-widest text-secondary uppercase">Step 1 of 5</span>
</div>
<!-- Title & Description -->
<section class="text-center mb-10">
<h2 class="font-headline text-4xl font-light tracking-tight text-on-surface mb-4">拍下它</h2>
<p class="font-body text-secondary tracking-wide text-sm">宠物 · 植物 · 玩具 · 物品</p>
</section>
<!-- Viewfinder / Camera Preview Area -->
<div class="relative w-full aspect-[4/5] rounded-lg overflow-hidden bg-surface-container-low flex items-center justify-center group shadow-sm">
<!-- Decorative Corners -->
<div class="absolute top-6 left-6 w-10 h-10 border-t-2 border-l-2 border-primary rounded-tl-lg"></div>
<div class="absolute top-6 right-6 w-10 h-10 border-t-2 border-r-2 border-primary rounded-tr-lg"></div>
<div class="absolute bottom-6 left-6 w-10 h-10 border-b-2 border-l-2 border-primary rounded-bl-lg"></div>
<div class="absolute bottom-6 right-6 w-10 h-10 border-b-2 border-r-2 border-primary rounded-br-lg"></div>
<!-- Placeholder Image with Overlay -->
<img class="w-full h-full object-cover opacity-80 grayscale-[20%]" data-alt="Soft focused interior scene of a sunlit living room with a peaceful Golden Retriever sitting near a wooden coffee table" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVxYu8oP1EMpYFeYpftsmKFwoJ9C6hxKJuaEiZgZAXpfBFdSCFj0eKQv3CWvToTHtXyxMiEsWa9QWg8DTkRwyJEp2NAAdElHtnSKBDUoWlHWhCbcrwFbYhgC3k_Kla9UiT629kVnzZxQA00LGnypB-E6gXR5z738m7riwyfsv9CMytxsTVOU_ponlGIBhkCQgsLoWo10Tz5e6g89cXQnmSX8ZKeuUB7rR-3AygVmPaBsPVBo25pDBGXLZYX5-GMCRUm53i3RXJMEpa"/>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/10"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-16 h-16 rounded-full border border-white/40 flex items-center justify-center backdrop-blur-sm">
<span class="material-symbols-outlined text-white text-3xl opacity-90">photo_camera</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full mt-12 flex flex-col gap-4">
<button class="w-full py-5 bg-primary-container text-on-primary-container rounded-lg font-body font-medium flex items-center justify-center gap-3 shadow-md active:scale-95 transition-transform">
<span class="material-symbols-outlined">camera</span>
                相机
            </button>
<button class="w-full py-5 bg-surface-container-highest text-primary rounded-lg font-body font-medium flex items-center justify-center gap-3 active:scale-95 transition-transform">
<span class="material-symbols-outlined">photo_library</span>
                从相册选取
            </button>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed based on Transactional Rule) -->
<!-- The user is in a focused 5-step onboarding/task flow. Main nav is suppressed. -->
<!-- Floating Content Decoration -->
<div class="fixed bottom-10 right-10 opacity-10 pointer-events-none select-none overflow-hidden">
<span class="font-headline text-[12rem] leading-none text-primary transform translate-x-20">B2</span>
</div>
</body></html>
