<body class="font-body selection:bg-primary-container/30">
<!-- Top Navigation Shell -->
<nav class="flex justify-between items-center px-6 h-16 w-full fixed top-0 left-0 z-50 transition-opacity duration-300">

</div>

<span class="material-symbols-outlined text-primary cursor-pointer hover:opacity-80 transition-opacity">account_circle</span>
</div>
</nav>
<!-- Main Content: The Digital Residence Map Shell -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden bg-surface">
<!-- Subtle Map Background -->
<div class="absolute inset-0 z-0 overflow-hidden">
<div class="absolute inset-0 opacity-40 map-canvas"></div>

<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-surface-container-low rounded-full blur-[100px] opacity-60"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary-container/20 rounded-full blur-[120px] opacity-40"></div>
<!-- Map Texture Overlay -->
<div class="absolute inset-0 bg-white/10 backdrop-blur-[2px]"></div>
<!-- Paris City Label Anchor -->
<div class="absolute top-32 left-1/2 -translate-x-1/2 flex flex-col items-center text-center">
<span class="font-headline text-primary font-light tracking-[0.4em] text-sm mb-2 opacity-60">CURRENT LOCATION</span>
<h2 class="font-headline text-6xl md:text-8xl text-primary font-light tracking-widest selection:bg-transparent">PARIS</h2>
<div class="h-[1px] w-24 bg-primary/20 mt-6"></div>
</div>
<!-- Contextual Map Visuals -->
<img class="absolute bottom-10 right-10 w-64 h-64 object-contain opacity-20 grayscale pointer-events-none" data-alt="vintage line drawing of an ornate classical compass rose on aged warm ivory parchment paper" src="https://lh3.googleusercontent.com/aida-public/AB6AXuByRD8k_ZpeqUm9TgKYE-zejlrTdDW9EbU_tGYsWaNnqZDie6YTzT-bAcgs8EjZBwXaU2weOHd6MjzGM_pOPy2KaiXyYziKZg3JbHHKFh2FjRLDQijCDWfe5fJsJKKsymuSMI5JG0ZGLw6ceLWr_87f0Iq62kIBlzHiWEFTAoPUc_ggXTFfCOxgSU1OLVKpVW_L7szpwj245xUKbBmwUYqw2ywkoN5EGn7vsbY7D6pOLyGdxLE5Ai04U1H2ayTqfcUPitviyEEKS_Mv"/>
</div>
<!-- Central Floating Card: "The Curated Sanctuary" Pattern -->
<section class="relative z-10 w-[90%] max-w-md">
<div class="bg-surface-container-lowest/80 backdrop-blur-xl rounded-lg p-10 md:p-14 text-center shadow-[0_32px_80px_rgba(112,87,49,0.08)] flex flex-col items-center border border-white/40">
<div class="w-12 h-[1px] bg-primary mb-8 opacity-40"></div>
<h1 class="font-headline text-3xl md:text-4xl text-on-surface font-light leading-relaxed tracking-wide mb-6">
                    世界在等待
                </h1>
<p class="font-body text-secondary text-base font-light leading-relaxed mb-12 max-w-xs mx-auto">
                    开启一段专属于你的数字旅程。在这里，每一寸土地都等待着你的发现与记录。
                </p>
<div class="flex flex-col w-full gap-4">
<!-- Primary CTA -->
<button class="bg-primary-container text-on-primary-container py-5 px-10 rounded-full font-label text-sm font-medium tracking-widest hover:opacity-90 transition-all duration-300 shadow-xl shadow-primary-container/20 group">
<span class="inline-block transform transition-transform duration-300 group-active:scale-95 uppercase">开始创建</span>
</button>
<!-- Secondary CTA -->
<button class="text-primary font-label text-[11px] font-semibold tracking-widest py-3 hover:opacity-70 transition-opacity uppercase">
                        浏览热门目的地
                    </button>
</div>
<div class="w-12 h-[1px] bg-primary mt-12 opacity-40"></div>
</div>
</section>
<!-- Decorative Map Coordinates (Asymmetric Layout) -->

</aside>
<aside class="absolute top-1/2 right-12 -translate-y-1/2 hidden lg:block select-none pointer-events-none">
<div class="[writing-mode:vertical-rl] font-headline text-sm tracking-[0.5em] text-primary/30 uppercase">

</a>

<span class="material-symbols-outlined">settings</span>
